<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.45);
    --accent: #c8a96e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 3rem 4rem 2rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    font-style: italic;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .filter-bar {
    display: flex;
    gap: 0.5rem;
    padding: 1.5rem 4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.45rem 1.2rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0c0c0c; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
    padding: 2px 4rem;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    cursor: pointer;
    background: var(--surface);
    transition: opacity 0.4s;
  }

  .gallery-item.hidden { display: none; }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s;
    filter: grayscale(20%) brightness(0.9);
  }

  .gallery-item:hover img {
    transform: scale(1.06);
    filter: grayscale(0%) brightness(1.05);
  }

  .item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.4s;
    display: flex;
    align-items: flex-end;
    padding: 1.2rem;
  }

  .gallery-item:hover .item-overlay { opacity: 1; }

  .item-info h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .item-info p {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 0.2rem;
  }

  .category-tag {
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--muted);
    backdrop-filter: blur(4px);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s;
  }

  .lightbox.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  .lightbox-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .lightbox-inner img {
    max-width: 100%;
    max-height: 78vh;
    object-fit: contain;
    border: 1px solid var(--border);
    animation: imgSlide 0.3s ease;
  }

  @keyframes imgSlide { from { opacity: 0; transform: scale(0.97) } to { opacity: 1; transform: scale(1) } }

  .lightbox-meta {
    text-align: center;
  }

  .lightbox-meta h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
  }

  .lightbox-meta p {
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 0.3rem;
  }

  .lightbox-controls {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .lb-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    width: 48px;
    height: 48px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lb-btn:hover { border-color: var(--accent); color: var(--accent); }

  .lb-close {
    position: fixed;
    top: 1.5rem;
    right: 2rem;
    font-size: 1.6rem;
    width: 44px;
    height: 44px;
  }

  .lb-counter {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 2.5rem;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }

  @media (max-width: 768px) {
    header { padding: 2rem 1.5rem 1.5rem; flex-direction: column; gap: 1rem; }
    .filter-bar { padding: 1rem 1.5rem; }
    .gallery-grid { padding: 2px 1.5rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>Frame</span>d — A Visual Archive</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
  <button class="filter-btn" data-filter="abstract">Abstract</button>
  <button class="filter-btn" data-filter="portrait">Portrait</button>
</div>

<div class="gallery-grid" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-btn lb-close" id="lb-close">✕</button>
  <div class="lightbox-inner">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-meta">
      <h2 id="lb-title"></h2>
      <p id="lb-cat"></p>
    </div>
  </div>
  <div class="lightbox-controls">
    <button class="lb-btn" id="lb-prev">←</button>
    <span class="lb-counter" id="lb-counter">1 / 12</span>
    <button class="lb-btn" id="lb-next">→</button>
  </div>
</div>

<footer>© 2025 Framed Gallery — CodeAlpha Internship Task 01</footer>

<script>
const images = [
  { title: "Misty Peaks", cat: "nature", src: "https://picsum.photos/seed/mist1/600/800", color: "#2d4a3e" },
  { title: "Neon Boulevard", cat: "urban", src: "https://picsum.photos/seed/city2/600/800", color: "#1a1a2e" },
  { title: "Colour Theory", cat: "abstract", src: "https://picsum.photos/seed/abs3/600/800", color: "#3d1a2e" },
  { title: "Golden Hour", cat: "portrait", src: "https://picsum.photos/seed/port4/600/800", color: "#3d2a0a" },
  { title: "Still Waters", cat: "nature", src: "https://picsum.photos/seed/water5/600/800", color: "#0a2d3d" },
  { title: "Concrete Grid", cat: "urban", src: "https://picsum.photos/seed/grid6/600/800", color: "#1f1f1f" },
  { title: "Formless", cat: "abstract", src: "https://picsum.photos/seed/form7/600/800", color: "#2a0a3d" },
  { title: "Solitude", cat: "portrait", src: "https://picsum.photos/seed/sol8/600/800", color: "#3d2010" },
  { title: "Forest Light", cat: "nature", src: "https://picsum.photos/seed/flit9/600/800", color: "#1a3d1a" },
  { title: "Bridge at Dusk", cat: "urban", src: "https://picsum.photos/seed/brdg10/600/800", color: "#0d1b2a" },
  { title: "Interference", cat: "abstract", src: "https://picsum.photos/seed/inter11/600/800", color: "#2d0d1f" },
  { title: "Reflection", cat: "portrait", src: "https://picsum.photos/seed/ref12/600/800", color: "#1a2a3d" },
];

const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbCat = document.getElementById('lb-cat');
const lbCounter = document.getElementById('lb-counter');

let currentIndex = 0;
let filteredImages = [...images];

function renderGallery(filter) {
  filteredImages = filter === 'all' ? images : images.filter(i => i.cat === filter);
  gallery.innerHTML = '';
  filteredImages.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="${img.src}" alt="${img.title}" loading="lazy">
      <span class="category-tag">${img.cat}</span>
      <div class="item-overlay">
        <div class="item-info">
          <h3>${img.title}</h3>
          <p>${img.cat}</p>
        </div>
      </div>
    `;
    item.addEventListener('click', () => openLightbox(idx));
    gallery.appendChild(item);
  });
}

function openLightbox(idx) {
  currentIndex = idx;
  updateLightbox();
  lightbox.classList.add('open');
}

function updateLightbox() {
  const img = filteredImages[currentIndex];
  lbImg.src = img.src;
  lbTitle.textContent = img.title;
  lbCat.textContent = img.cat;
  lbCounter.textContent = `${currentIndex + 1} / ${filteredImages.length}`;
}

document.getElementById('lb-close').addEventListener('click', () => lightbox.classList.remove('open'));
document.getElementById('lb-prev').addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + filteredImages.length) % filteredImages.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % filteredImages.length;
  updateLightbox();
});

lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.filter);
  });
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
  if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
  if (e.key === 'Escape') lightbox.classList.remove('open');
});

renderGallery('all');
</script>
</body>
</html>
